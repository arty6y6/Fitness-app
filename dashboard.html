<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <h2>🏋️ Dashboard</h2>
    <div>
      <button onclick="toggleTheme()">🌙 Toggle Theme</button>
    </div>
  </nav>

  <main class="container">
    <div class="card">
      <h3>Quick Actions</h3>
      <button onclick="goWorkout()">➕ Log Workout</button>
      <button onclick="goProgress()">📊 Weekly Progress</button>
    </div>

    <div class="card">
      <h3>Recent Workouts</h3>
      <ul id="recentList"></ul>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
